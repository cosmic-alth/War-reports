<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UAE EMERGENCY GUARDIAN | LIVE AI SITREP</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --danger: #ef4444; --safe: #22c55e; --text: #f8fafc; --sub: #94a3b8; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; overflow: hidden; height: 100vh; }
        #app { display: grid; grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: 100vh; }
        @media (min-width: 900px) { #app { grid-template-columns: 420px 1fr; grid-template-rows: 1fr; } }
        
        .sidebar { background: var(--panel); border-right: 1px solid #334155; display: flex; flex-direction: column; overflow: hidden; z-index: 100; box-shadow: 4px 0 15px rgba(0,0,0,0.5); }
        .content-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; -webkit-overflow-scrolling: touch; touch-action: pan-y; }
        .status-header { background: #1e1b4b; padding: 15px; border-bottom: 3px solid var(--danger); transition: 0.5s; }
        .status-header.all-clear { border-bottom-color: var(--safe); background: #064e3b; }
        
        .card { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 12px; }
        .chat-box { height: 180px; overflow-y: auto; font-size: 0.85rem; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 4px; margin-bottom: 8px; }
        .ai-line { color: var(--accent); margin-bottom: 8px; border-left: 2px solid var(--accent); padding-left: 8px; }
        .user-line { color: var(--text); margin-bottom: 8px; text-align: right; font-style: italic; }
        
        .tab-nav { display: flex; background: #0f172a; padding: 5px; gap: 5px; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-radius: 4px; font-size: 0.8rem; font-weight: 600; color: var(--sub); }
        .tab.active { background: var(--accent); color: #000; }
        
        input, button { padding: 10px; border-radius: 6px; border: 1px solid #334155; }
        input { background: #1e293b; color: white; flex: 1; }
        button { background: var(--accent); color: #000; border: none; font-weight: bold; cursor: pointer; }
        .danger-btn { background: var(--danger); color: white; width: 100%; }

        #map { background: #0b0f19; width: 100%; height: 100%; }
        .handshake-btn { position: fixed; inset: 0; z-index: 9999; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; border: none; cursor: pointer; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<button id="handshake" class="handshake-btn">
    <div style="font-size: 3rem; margin-bottom: 15px;">🛡️</div>
    <div style="font-weight: bold; letter-spacing: 2px; font-size: 1.2rem;">INITIALIZE GUARDIAN AI</div>
    <div style="color: var(--sub); font-size: 0.8rem; margin-top: 15px;">Live Airspace & Missile Tracking...</div>
</button>

<div id="app" style="display:none;">
    <aside class="sidebar">
        <div id="header-box" class="status-header">
            <h1 style="margin:0; font-size:1.1rem;">UAE SITREP</h1>
            <p id="timer" style="margin:5px 0 0; font-size:0.75rem; font-weight:bold;">SYNCING DATA...</p>
        </div>

        <nav class="tab-nav">
            <div class="tab active" onclick="switchTab('guide')">SMART AI</div>
            <div class="tab" onclick="switchTab('news')">INTEL FEED</div>
        </nav>

        <div id="guide-tab" class="content-area">
            <div class="card">
                <small style="color:var(--accent); font-weight:bold;">GUARDIAN AI (GEMINI 1.5)</small>
                <div id="chat-history" class="chat-box">
                    <div class="ai-line">"System initialized. Monitoring Saadiyat & Khalifa City sectors. How can I help?"</div>
                </div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="ai-input" placeholder="Ask AI anything...">
                    <button onclick="askAI()">SEND</button>
                </div>
            </div>

            <button class="danger-btn" onclick="checkProximity()">STREET-LEVEL SAFETY CHECK</button>

            <div class="card">
                <small style="color:var(--sub)">FLIGHT STATUS (EK/AI/INDIGO)</small>
                <div style="display:flex; gap:5px; margin-top:8px;">
                    <input type="text" id="flightNum" placeholder="e.g. EK530">
                    <button onclick="trackFlight()">RADAR</button>
                </div>
                <div id="flight-out" style="margin-top:8px; font-size:0.75rem;"></div>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                <a href="tel:999" style="background:var(--danger); color:white; text-decoration:none; text-align:center; padding:12px; border-radius:6px; font-weight:bold;">POLICE 999</a>
                <a href="tel:80046342" style="background:#334155; color:white; text-decoration:none; text-align:center; padding:12px; border-radius:6px; font-weight:bold;">INDIA HELP</a>
            </div>
        </div>

        <div id="news-tab" class="content-area" style="display:none;">
            <div id="news-list">Awaiting News Intel...</div>
        </div>
    </aside>
    <main id="map"></main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- CONFIG ---
    const NEWS_KEY = 'pub_2c5d5364391f4045945da79ca4f87a50'; 
    const FLIGHT_KEY = 'd5e173661faa7a4b822797e42666b6f3';
    const GEMINI_KEY = 'AIzaSyCzT_6G7rBx4DZOR9hvIypl5BwXri0PSeo'; 
    const GEMINI_URL = "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent";

    let userLoc = null;
    const dangerZones = [
        {name: "Khalifa City", pos: [24.41, 54.58]}, {name: "Saadiyat", pos: [24.53, 54.43]},
        {name: "MBZ City", pos: [24.31, 54.54]}, {name: "Bani Yas", pos: [24.28, 54.63]}
    ];

    // --- INITIALIZE (FIXED) ---
    document.getElementById('handshake').addEventListener('click', function() {
        this.style.display = 'none';
        document.getElementById('app').style.display = 'grid';
        
        // Force map refresh
        setTimeout(() => { map.invalidateSize(); }, 200);

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                userLoc = [p.coords.latitude, p.coords.longitude];
                updateUserMarker();
                map.setView(userLoc, 12);
            }, (err) => {
                console.warn("GPS Denied - Using default view.");
            });
        }
        fetchNews(); startTimer();
    });

    // --- AI CHAT (FIXED ENDPOINT) ---
    async function askAI() {
        const input = document.getElementById('ai-input');
        const history = document.getElementById('chat-history');
        const userText = input.value.trim();
        if(!userText || GEMINI_KEY.includes('REPLACE')) return;

        history.innerHTML += `<div class="user-line">${userText}</div>`;
        input.value = "";
        history.scrollTop = history.scrollHeight;

        try {
            const response = await fetch(`${GEMINI_URL}?key=${GEMINI_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `You are an Emergency AI for UAE. Respond briefly and calmly. User: ${userText}` }] }]
                })
            });
            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;
            history.innerHTML += `<div class="ai-line">${aiText}</div>`;
        } catch (e) {
            history.innerHTML += `<div class="ai-line" style="color:red">AI Offline. Check API Key.</div>`;
        }
        history.scrollTop = history.scrollHeight;
    }

    // --- MAP & RADAR ---
    const map = L.map('map', { zoomControl: false }).setView([24.45, 54.37], 10);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    dangerZones.forEach(z => L.circle(z.pos, {radius: 3000, color: 'red', fillOpacity: 0.2}).addTo(map));

    function checkProximity() {
        if(!userLoc) { alert("Enable GPS for safety check."); return; }
        let inDanger = dangerZones.some(z => getDist(userLoc[0], userLoc[1], z.pos[0], z.pos[1]) < 6);
        alert(inDanger ? "⚠️ WARNING: IMPACT DEBRIS NEAR YOU. STAY INDOORS." : "✅ STATUS SECURE: You are outside reported fallout zones.");
    }

    async function trackFlight() {
        const fn = document.getElementById('flightNum').value.trim();
        const out = document.getElementById('flight-out');
        out.innerText = "Querying Live Radar...";
        try {
            const r = await fetch(`https://api.aviationstack.com/v1/flights?access_key=${FLIGHT_KEY}&flight_iata=${fn}`);
            const d = await r.json();
            if(d.data && d.data.length > 0) {
                const f = d.data[0];
                out.innerHTML = `STATUS: <b style="color:red">${f.flight_status.toUpperCase()}</b> | ${f.departure.iata}➔${f.arrival.iata}`;
            } else { out.innerText = "No hits. Flight likely Diverted/Cancelled."; }
        } catch (e) { out.innerText = "Signal disrupted."; }
    }

    async function fetchNews() {
        try {
            const r = await fetch(`https://newsdata.io/api/1/news?apikey=${NEWS_KEY}&q=UAE%20OR%20NCEMA&language=en`);
            const d = await r.json();
            document.getElementById('news-list').innerHTML = d.results.slice(0, 8).map(n => `
                <div style="border-bottom:1px solid #334155; padding:8px 0;">
                    <a href="${n.link}" target="_blank" style="color:var(--accent); font-size:0.85rem; text-decoration:none;"><b>${n.title}</b></a>
                </div>
            `).join('');
        } catch (e) { document.getElementById('news-list').innerText = "News Offline."; }
    }

    function getDist(la1, lo1, la2, lo2) {
        const R = 6371;
        const dLat = (la2-la1) * Math.PI / 180, dLon = (lo2-lo1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function startTimer() {
        setInterval(() => {
            const now = new Date(), br = new Date(); br.setHours(18,0,0); let d = br - now;
            if(d < 0) d += 86400000;
            const h = Math.floor(d/3600000), m = Math.floor((d%3600000)/60000), s = Math.floor((d%60000)/1000);
            document.getElementById('timer').innerText = `NEXT NCEMA UPDATE: ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }, 1000);
    }

    function switchTab(t) {
        document.getElementById('guide-tab').style.display = t === 'guide' ? 'flex' : 'none';
        document.getElementById('news-tab').style.display = t === 'news' ? 'flex' : 'none';
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    let userMarker = null;
    function updateUserMarker() {
        if(userMarker) map.removeLayer(userMarker);
        userMarker = L.circle(userLoc, {radius: 400, color: '#38bdf8'}).addTo(map).bindPopup("YOU").openPopup();
    }
</script>
</body>
</html>
