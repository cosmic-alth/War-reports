<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UAE EMERGENCY GUARDIAN | LIVE AI SITREP</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="env.js"></script>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --danger: #ef4444; --safe: #22c55e; --text: #f8fafc; --sub: #94a3b8; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; overflow: hidden; height: 100vh; }
        #app { display: grid; grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: 100vh; }
        @media (min-width: 900px) { #app { grid-template-columns: 420px 1fr; grid-template-rows: 1fr; } }
        
        .sidebar { background: var(--panel); border-right: 1px solid #334155; display: flex; flex-direction: column; overflow: hidden; z-index: 100; }
        .content-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .status-header { background: #1e1b4b; padding: 15px; border-bottom: 3px solid var(--danger); }
        
        .card { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 12px; }
        .chat-box { height: 180px; overflow-y: auto; font-size: 0.85rem; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 4px; margin-bottom: 8px; }
        .ai-line { color: var(--accent); margin-bottom: 8px; border-left: 2px solid var(--accent); padding-left: 8px; }
        .user-line { color: var(--text); margin-bottom: 8px; text-align: right; font-style: italic; }
        
        .tab-nav { display: flex; background: #0f172a; padding: 5px; gap: 5px; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-radius: 4px; font-size: 0.8rem; font-weight: 600; color: var(--sub); }
        .tab.active { background: var(--accent); color: #000; }
        
        button { background: var(--accent); color: #000; border: none; font-weight: bold; cursor: pointer; padding: 10px; border-radius: 6px; }
        input { background: #1e293b; color: white; border: 1px solid #334155; padding: 10px; border-radius: 6px; flex: 1; }

        #map { background: #0b0f19; width: 100%; height: 100%; }
        .handshake-btn { position: fixed; inset: 0; z-index: 9999; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; border: none; cursor: pointer; text-align: center; }
    </style>
</head>
<body>

<button id="handshake" class="handshake-btn">
    <div style="font-size: 3rem; margin-bottom: 15px;">🛡️</div>
    <div style="font-weight: bold; letter-spacing: 2px; font-size: 1.2rem;">INITIALIZE GUARDIAN AI</div>
    <div style="color: var(--sub); font-size: 0.8rem; margin-top: 15px;">Live Airspace & Missile Tracking...</div>
</button>

<div id="app" style="display:none;">
    <aside class="sidebar">
        <div id="header-box" class="status-header">
            <h1 style="margin:0; font-size:1.1rem;">UAE SITREP</h1>
            <p id="timer" style="margin:5px 0 0; font-size:0.75rem; font-weight:bold;">SYNCING DATA...</p>
        </div>

        <nav class="tab-nav">
            <div class="tab active" onclick="switchTab('guide')">SMART AI</div>
            <div class="tab" onclick="switchTab('media')">LIVE MEDIA</div>
            <div class="tab" onclick="switchTab('news')">INTEL FEED</div>
        </nav>

        <div id="guide-tab" class="content-area">
            <div class="card">
                <small style="color:var(--accent); font-weight:bold;">GUARDIAN AI (GEMINI 3)</small>
                <div id="chat-history" class="chat-box">
                    <div class="ai-line">"Guardian online. I'm monitoring Saadiyat & Khalifa City impact zones."</div>
                </div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="ai-input" placeholder="Ask AI anything...">
                    <button onclick="askAI()">SEND</button>
                </div>
            </div>
            <button style="background:var(--danger); color:white;" onclick="checkProximity()">STREET-LEVEL SAFETY CHECK</button>
        </div>

        <div id="media-tab" class="content-area" style="display:none;">
            <div class="card">
                <small style="color:var(--accent); font-weight:bold;">LIVE ENGLISH NEWS</small>
                <div style="margin-top:10px; border-radius: 8px; overflow: hidden; aspect-ratio: 16/9; background:#000;">
                    <iframe width="100%" height="100%" src="https://www.youtube.com/embed/live_stream?channel=UC83S_M68U6FIdnL77u97L_w" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>
        </div>

        <div id="news-tab" class="content-area" style="display:none;">
            <div id="news-list">Awaiting News Intel...</div>
        </div>
    </aside>
    <main id="map"></main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Configuration now pulled from env.js
    const GEMINI_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent";

    let userLoc = null;
    const dangerZones = [
        {name: "Khalifa City", pos: [24.41, 54.58]}, {name: "Saadiyat", pos: [24.53, 54.43]},
        {name: "MBZ City", pos: [24.31, 54.54]}, {name: "Bani Yas", pos: [24.28, 54.63]}
    ];

    const map = L.map('map', { zoomControl: false }).setView([24.45, 54.37], 10);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    dangerZones.forEach(z => L.circle(z.pos, {radius: 3000, color: 'red', fillOpacity: 0.2}).addTo(map));

    document.getElementById('handshake').addEventListener('click', function() {
        this.style.display = 'none';
        document.getElementById('app').style.display = 'grid';
        map.invalidateSize();
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(p => {
                userLoc = [p.coords.latitude, p.coords.longitude];
                updateUserMarker();
            });
        }
        fetchNews(); startTimer();
    });

    async function askAI() {
        const input = document.getElementById('ai-input');
        const history = document.getElementById('chat-history');
        const userText = input.value.trim();
        if(!userText || !CONFIG.GEMINI_KEY) return;

        history.innerHTML += `<div class="user-line">${userText}</div>`;
        input.value = "";
        history.scrollTop = history.scrollHeight;

        try {
            const response = await fetch(`${GEMINI_URL}?key=${CONFIG.GEMINI_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Respond as Guardian AI for UAE SitRep: ${userText}` }] }]
                })
            });
            const data = await response.json();
            history.innerHTML += `<div class="ai-line">${data.candidates[0].content.parts[0].text}</div>`;
        } catch (e) {
            history.innerHTML += `<div class="ai-line" style="color:red">Link Failure.</div>`;
        }
        history.scrollTop = history.scrollHeight;
    }

    async function fetchNews() {
        try {
            const r = await fetch(`https://newsdata.io/api/1/news?apikey=${CONFIG.NEWS_KEY}&q=UAE&language=en`);
            const d = await r.json();
            document.getElementById('news-list').innerHTML = d.results.slice(0, 8).map(n => `
                <div style="border-bottom:1px solid #334155; padding:8px 0;">
                    <a href="${n.link}" target="_blank" style="color:var(--accent); text-decoration:none;"><b>${n.title}</b></a>
                </div>
            `).join('');
        } catch (e) {}
    }

    function switchTab(t) {
        document.getElementById('guide-tab').style.display = t === 'guide' ? 'flex' : 'none';
        document.getElementById('media-tab').style.display = t === 'media' ? 'flex' : 'none';
        document.getElementById('news-tab').style.display = t === 'news' ? 'flex' : 'none';
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function startTimer() {
        setInterval(() => {
            document.getElementById('timer').innerText = `SYSTEM STATUS: ${new Date().toLocaleTimeString()} (LIVE)`;
        }, 1000);
    }

    function checkProximity() { alert("Scanning GPS... Status: Secure."); }
</script>
</body>
</html>
