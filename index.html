<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UAE GUARDIAN v2.1</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --danger: #ef4444; --text: #f8fafc; --sub: #94a3b8; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* THE OVERLAY MUST HAVE A BUTTON */
        #portal-overlay { 
            position: fixed; inset: 0; z-index: 10000; background: #0f172a; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .portal-box { border: 2px solid var(--accent); padding: 40px; border-radius: 20px; text-align: center; background: rgba(255,255,255,0.05); }
        .start-btn { 
            background: var(--accent); color: #000; padding: 20px 50px; border-radius: 50px; 
            font-weight: bold; font-size: 1.2rem; border: none; cursor: pointer; margin-top: 20px;
            box-shadow: 0 0 15px var(--accent);
        }

        /* FLEX LAYOUT FOR 50/50 SPLIT */
        #main-interface { display: none; flex-direction: column; height: 100vh; width: 100%; }
        .sidebar { background: var(--panel); height: 50%; display: flex; flex-direction: column; border-bottom: 2px solid #334155; }
        #map { height: 50%; width: 100%; background: #000; }

        .tab-content { flex: 1; overflow-y: auto; padding: 15px; }
        .card { background: #0f172a; border: 1px solid #334155; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .chat-area { height: 100px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; margin-bottom: 10px; font-size: 0.9rem; }
        
        .nav-tabs { display: flex; background: #000; }
        .t-btn { flex: 1; padding: 12px; color: var(--sub); text-align: center; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .t-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        .input-row { display: flex; gap: 5px; }
        input { flex: 1; background: #1e293b; color: white; border: 1px solid #334155; padding: 10px; border-radius: 4px; }
        .send-btn { background: var(--accent); border: none; padding: 10px 20px; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>

<div id="portal-overlay">
    <div class="portal-box">
        <div style="font-size: 4rem;">🛡️</div>
        <h1 style="letter-spacing:2px;">GUARDIAN v2.1</h1>
        <button class="start-btn" onclick="launchApp()">OPEN DASHBOARD</button>
    </div>
</div>

<div id="main-interface">
    <div class="sidebar">
        <div style="background: #1e1b4b; padding: 10px; font-weight: bold; font-size: 0.9rem; color: var(--danger);">LIVE SITREP: ACTIVE</div>
        
        <div class="nav-tabs">
            <div id="tab-ai" class="t-btn active" onclick="setTab('ai')">AI ADVISOR</div>
            <div id="tab-news" class="t-btn" onclick="setTab('news')">INTEL</div>
        </div>

        <div id="ai-pane" class="tab-content">
            <div class="card">
                <div id="chat-hist" class="chat-area">
                    <div style="color:var(--accent)">System: Encryption Active. Standing by...</div>
                </div>
                <div class="input-row">
                    <input type="text" id="ai-in" placeholder="Ask something...">
                    <button class="send-btn" onclick="handleAI()">SEND</button>
                </div>
            </div>
            <button onclick="alert('Scanning local GPS... Sector Clear.')" style="width:100%; padding:15px; background:var(--danger); color:white; border:none; border-radius:8px; font-weight:bold;">GPS SAFETY CHECK</button>
        </div>

        <div id="news-pane" class="tab-content" style="display:none;">
            <div id="news-feed">Fetching satellite intel...</div>
        </div>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const VERSION = "2.1"; // Forces browser to see change
    const GEMINI_KEY = 'PROCESSED_GEMINI_KEY';
    const GEMINI_URL = "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent";

    const map = L.map('map', { zoomControl: false }).setView([24.45, 54.37], 11);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    function launchApp() {
        document.getElementById('portal-overlay').style.display = 'none';
        document.getElementById('main-interface').style.display = 'flex';
        setTimeout(() => { map.invalidateSize(); }, 200);
    }

    async function handleAI() {
        const box = document.getElementById('ai-in');
        const hist = document.getElementById('chat-hist');
        const query = box.value.trim();
        if(!query) return;

        hist.innerHTML += `<div style="text-align:right; margin-bottom:10px; color:#fff;">${query}</div>`;
        box.value = "";

        try {
            const r = await fetch(`${GEMINI_URL}?key=${GEMINI_KEY}`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({contents: [{parts: [{text: "Emergency AI response for: " + query}]}]})
            });
            const d = await r.json();
            const reply = d.candidates[0].content.parts[0].text;
            hist.innerHTML += `<div style="color:var(--accent); margin-bottom:10px;">${reply}</div>`;
        } catch (e) {
            hist.innerHTML += `<div style="color:red">AI Key Error. Ensure GitHub Secrets is set.</div>`;
        }
        hist.scrollTop = hist.scrollHeight;
    }

    function setTab(t) {
        document.getElementById('ai-pane').style.display = t === 'ai' ? 'block' : 'none';
        document.getElementById('news-pane').style.display = t === 'news' ? 'block' : 'none';
        document.getElementById('tab-ai').classList.toggle('active', t === 'ai');
        document.getElementById('tab-news').classList.toggle('active', t === 'news');
    }
</script>
</body>
</html>
