<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UAE EMERGENCY GUARDIAN | v3.1</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="env.js"></script>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --danger: #ef4444; --text: #f8fafc; --sub: #94a3b8; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; height: 100vh; }
        #app { display: none; grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: 100vh; }
        @media (min-width: 900px) { #app { display: grid; grid-template-columns: 420px 1fr; grid-template-rows: 1fr; } }
        
        .sidebar { background: var(--panel); border-right: 1px solid #334155; display: flex; flex-direction: column; overflow: hidden; }
        .content-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .card { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 12px; }
        
        .tab-nav { display: flex; background: #0f172a; padding: 5px; gap: 5px; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-radius: 4px; font-size: 0.75rem; font-weight: bold; color: var(--sub); }
        .tab.active { background: var(--accent); color: #000; }
        
        .scroll-box { height: 140px; overflow-y: auto; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 4px; font-size: 0.85rem; }
        .input-grp { display: flex; gap: 5px; margin-top: 8px; }
        input { background: #1e293b; color: white; border: 1px solid #334155; padding: 10px; border-radius: 6px; flex: 1; }
        button { background: var(--accent); color: #000; border: none; font-weight: bold; cursor: pointer; padding: 10px; border-radius: 6px; }

        #map { background: #000; width: 100%; height: 100%; }
        .portal { position: fixed; inset: 0; z-index: 9999; background: #0f172a; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="portal" class="portal">
    <div style="font-size: 3.5rem;">🛡️</div>
    <h2 style="letter-spacing: 1px;">GUARDIAN UAE</h2>
    <button style="padding: 15px 40px; font-size: 1.1rem; margin-top: 20px; border-radius: 50px;" onclick="init()">OPEN DASHBOARD</button>
</div>

<div id="app">
    <aside class="sidebar">
        <div style="background: #1e1b4b; padding: 15px; border-bottom: 3px solid var(--danger);">
            <h1 style="margin:0; font-size:1rem;">EMERGENCY SITREP</h1>
            <p id="timer" style="font-size:0.75rem; color:var(--accent); margin:5px 0 0;">SYNCING...</p>
        </div>

        <nav class="tab-nav">
            <div class="tab active" onclick="switchTab('ai')">AI & NEWS</div>
            <div class="tab" onclick="switchTab('media')">LIVE TV</div>
            <div class="tab" onclick="switchTab('radar')">FLIGHTS</div>
        </nav>

        <div id="ai-tab" class="content-area">
            <div class="card">
                <small style="color:var(--accent)">TACTICAL AI</small>
                <div id="chat-hist" class="scroll-box">"Standing by for safety queries."</div>
                <div class="input-grp">
                    <input type="text" id="ai-in" placeholder="Ask AI...">
                    <button onclick="askAI()">SEND</button>
                </div>
            </div>
            <div class="card">
                <small style="color:var(--accent)">INTEL FEED</small>
                <div id="news-list" class="scroll-box">Fetching news...</div>
            </div>
            <button style="background:var(--danger); color:white;" onclick="checkGPS()">GPS SAFETY CHECK</button>
        </div>

        <div id="media-tab" class="content-area" style="display:none;">
            <div class="card">
                <small style="color:var(--accent)">LIVE NEWS STREAM</small>
                <iframe style="margin-top:10px; border-radius:8px;" width="100%" height="200" src="https://www.youtube.com/embed/wjjRjkFu1W8?autoplay=1" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

        <div id="radar-tab" class="content-area" style="display:none;">
            <div class="card">
                <small style="color:var(--accent)">FLIGHT SEARCH</small>
                <div class="input-grp">
                    <input type="text" id="fl-in" placeholder="e.g. EK530">
                    <button onclick="searchFlight()">TRACK</button>
                </div>
                <div id="fl-out" style="margin-top:10px; font-size:0.8rem; color:var(--sub);"></div>
            </div>
        </div>
    </aside>
    <main id="map"></main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([24.45, 54.37], 10);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    // Restore Danger Zones
    const zones = [
        {n: "Khalifa City", p: [24.41, 54.58]}, {n: "Saadiyat", p: [24.53, 54.43]},
        {n: "MBZ City", p: [24.31, 54.54]}, {n: "Bani Yas", p: [24.28, 54.63]}
    ];
    zones.forEach(z => L.circle(z.p, {radius: 3000, color: 'red', fillOpacity: 0.2}).addTo(map));

    function init() {
        document.getElementById('portal').style.display = 'none';
        document.getElementById('app').style.display = 'grid';
        setTimeout(() => map.invalidateSize(), 200);
        fetchNews(); startClock();
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                const loc = [p.coords.latitude, p.coords.longitude];
                L.circle(loc, {radius: 500, color: '#38bdf8'}).addTo(map);
                map.flyTo(loc, 11);
            });
        }
    }

    async function askAI() {
        const inp = document.getElementById('ai-in');
        const hist = document.getElementById('chat-hist');
        const txt = inp.value.trim();
        if(!txt || !CONFIG.GEMINI_KEY) return;

        hist.innerHTML += `<div style="text-align:right; margin:5px 0;">${txt}</div>`;
        inp.value = "";

        try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${CONFIG.GEMINI_KEY}`, {
                method: "POST", headers: {"Content-Type":"application/json"},
                body: JSON.stringify({contents:[{parts:[{text:"Emergency advice for: "+txt}]}]})
            });
            const d = await r.json();
            hist.innerHTML += `<div style="color:var(--accent); margin-bottom:10px;">${d.candidates[0].content.parts[0].text}</div>`;
        } catch(e) { hist.innerHTML += `<div style="color:red">AI Error.</div>`; }
        hist.scrollTop = hist.scrollHeight;
    }

    async function searchFlight() {
        const fn = document.getElementById('fl-in').value.trim();
        const out = document.getElementById('fl-out');
        if(!fn) return;
        out.innerText = "Querying Radar...";
        try {
            const r = await fetch(`https://api.aviationstack.com/v1/flights?access_key=${CONFIG.FLIGHT_KEY}&flight_iata=${fn}`);
            const d = await r.json();
            if(d.data && d.data.length > 0) {
                const f = d.data[0];
                out.innerHTML = `STATUS: <b style="color:red">${f.flight_status.toUpperCase()}</b><br>${f.departure.iata} ➔ ${f.arrival.iata}`;
            } else { out.innerText = "No flight found."; }
        } catch(e) { out.innerText = "Radar Disrupted."; }
    }

    async function fetchNews() {
        try {
            const r = await fetch(`https://newsdata.io/api/1/news?apikey=${CONFIG.NEWS_KEY}&q=UAE&language=en`);
            const d = await r.json();
            document.getElementById('news-list').innerHTML = d.results.slice(0,5).map(n => `<div style="margin-bottom:8px;"><a href="${n.link}" target="_blank" style="color:var(--accent); text-decoration:none;">${n.title}</a></div>`).join('');
        } catch(e) {}
    }

    function switchTab(t) {
        document.getElementById('ai-tab').style.display = t==='ai'?'flex':'none';
        document.getElementById('media-tab').style.display = t==='media'?'flex':'none';
        document.getElementById('radar-tab').style.display = t==='radar'?'flex':'none';
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function startClock() { setInterval(() => { document.getElementById('timer').innerText = `LIVE: ${new Date().toLocaleTimeString()}`; }, 1000); }
    function checkGPS() { alert("Scan Complete. Status: Outside impact sectors."); }
</script>
</body>
</html>
