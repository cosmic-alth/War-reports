<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITREP | UAE WAR MONITOR</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #050505; --panel: #111; --text: #00ff41; --danger: #ff0000; --warn: #ffcc00; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; overflow: hidden; }
        #app { display: grid; grid-template-columns: 1fr; grid-template-rows: auto 1fr 250px; height: 100vh; }
        @media (min-width: 768px) { #app { grid-template-columns: 350px 1fr; grid-template-rows: 80px 1fr; } }

        /* Top Header & Status */
        .status-header { grid-column: 1 / -1; background: #1a0000; border-bottom: 2px solid var(--danger); padding: 10px 20px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: space-between; }
        .indicator { padding: 4px 8px; border: 1px solid var(--text); font-size: 0.75em; display: flex; align-items: center; gap: 5px; }
        .status-closed { color: var(--danger); border-color: var(--danger); }
        
        /* Map Area */
        #map { background: #000; width: 100%; height: 100%; border-right: 1px solid #333; }

        /* Sidebar Feed */
        .sidebar { background: var(--panel); overflow-y: auto; padding: 15px; border-top: 1px solid #333; }
        .news-card { border-left: 3px solid var(--danger); background: #0a0a0a; padding: 10px; margin-bottom: 12px; font-size: 0.8em; }
        
        /* Animations */
        .blink { animation: blinker 1s step-start infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="app">
    <div class="status-header">
        <div style="font-weight: bold; font-size: 1.1em;">MISSION: EPIC FURY <span class="blink" style="color:var(--danger)">● LIVE</span></div>
        <div style="display: flex; gap: 10px;">
            <div class="indicator status-closed">DXB: CLOSED</div>
            <div class="indicator status-closed">AUH: CLOSED</div>
            <div class="indicator" style="color:var(--warn); border-color:var(--warn);">AIRSPACE: PARTIAL CLOSURE</div>
        </div>
    </div>

    <div id="map"></div>

    <div class="sidebar">
        <div style="font-size: 0.7em; margin-bottom: 10px; color: #888;">INTEL FEED (REFRESH: 40s)</div>
        <div id="news-feed">Awaiting secure uplink...</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- 1. CONFIGURATION ---
    const API_KEY = 'pub_2c5d5364391f4045945da79ca4f87a50'; // Get from newsdata.io

    // --- 2. THE MAP (Leaflet + Esri Satellite) ---
    // No Mapbox key needed. This uses free Esri Satellite tiles.
    const map = L.map('map', { zoomControl: false }).setView([25.0, 55.0], 6);
    
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles &copy; Esri'
    }).addTo(map);

    // Add Threat Zone Overlays (Persian Gulf Corridor)
    const threatZone = [[31.0, 47.0], [31.0, 61.0], [22.0, 61.0], [22.0, 47.0]];
    L.polygon(threatZone, {
        color: 'red', weight: 1, fillColor: '#ff0000', fillOpacity: 0.15
    }).addTo(map).bindPopup("CRITICAL THREAT ZONE: ACTIVE MISSILE TRACKS");

    // Add Markers for UAE Cities under alert
    const targets = [
        {name: "ABU DHABI (DEBRIS REPORTED)", pos: [24.45, 54.37]},
        {name: "DUBAI (AIRSPACE CLOSED)", pos: [25.20, 55.27]}
    ];
    targets.forEach(t => {
        L.circleMarker(t.pos, {color: 'red', radius: 8, fillOpacity: 0.8}).addTo(map).bindPopup(t.name);
    });

    // --- 3. LIVE NEWS UPDATER ---
    async function updateNews() {
        const container = document.getElementById('news-feed');
        if (API_KEY.includes('PASTE')) {
            container.innerHTML = "<div class='news-card'>[SYSTEM] Please enter your NewsData.io API Key in the code to see live updates.</div>";
            return;
        }
        try {
            // Searches for UAE, Iran strikes, and B-2 mentions
            const res = await fetch(`https://newsdata.io/api/1/news?apikey=${API_KEY}&q=UAE%20Iran%20strike%20OR%20B-2&language=en`);
            const data = await res.json();
            container.innerHTML = data.results.slice(0, 10).map(art => `
                <div class="news-card">
                    <strong>${art.title}</strong><br>
                    <small style="color:#888;">Source: ${art.source_id} | ${new Date().toLocaleTimeString()}</small>
                </div>
            `).join('');
        } catch (e) {
            container.innerHTML = "<div class='news-card'>Signal jammed. Retrying uplink...</div>";
        }
    }

    // Refresh Cycle
    setInterval(updateNews, 40000);
    updateNews();
</script>
</body>
</html>
