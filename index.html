<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UAE GUARDIAN | v3.6</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="env.js"></script>
    <style>
        :root { --bg: #020617; --panel: #1e293b; --accent: #38bdf8; --danger: #ef4444; --text: #f8fafc; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #app { display: none; flex-direction: column; height: 100vh; width: 100%; }
        .sidebar { background: var(--panel); min-height: 280px; height: 50%; display: flex; flex-direction: column; overflow: hidden; }
        .resizer { height: 14px; background: #334155; cursor: ns-resize; display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 10px; font-weight: bold; }
        #map { flex: 1; background: #000; }
        .status-bar { background: #7f1d1d; color: white; padding: 10px; font-size: 0.8rem; font-weight: bold; display: flex; justify-content: space-between; }
        .tab-nav { display: flex; background: #0f172a; padding: 4px; gap: 4px; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-radius: 4px; font-size: 0.75rem; font-weight: bold; color: #94a3b8; }
        .tab.active { background: var(--accent); color: #020617; }
        .card { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 10px; margin: 10px; }
        .scroll-box { height: 100px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 4px; font-size: 0.85rem; }
        input { background: #1e293b; color: white; border: 1px solid #334155; padding: 10px; border-radius: 6px; flex: 1; }
        button { background: var(--accent); color: #000; border: none; font-weight: bold; padding: 10px; border-radius: 6px; cursor: pointer; }
        .portal { position: fixed; inset: 0; z-index: 9999; background: #020617; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="portal" class="portal">
    <div style="font-size: 4rem;">📡</div>
    <h2>GUARDIAN UAE</h2>
    <p>SECURE TERMINAL ACCESS</p>
    <button style="padding: 15px 40px; border-radius: 50px;" onclick="init()">INITIALIZE SYSTEM</button>
</div>

<div id="app">
    <div class="status-bar">
        <span>⚠️ ALERT: HIGH</span>
        <span id="timer">--:--:--</span>
    </div>

    <aside class="sidebar" id="sidebar">
        <nav class="tab-nav">
            <div class="tab active" onclick="switchTab('ai')">AI ADVISOR</div>
            <div class="tab" onclick="switchTab('media')">LIVE TV</div>
            <div class="tab" onclick="switchTab('radar')">RADAR</div>
        </nav>

        <div id="ai-tab" style="overflow-y:auto;">
            <div class="card">
                <div id="chat-hist" class="scroll-box">"Guardian Online. No login required."</div>
                <div style="display:flex; gap:5px; margin-top:8px;">
                    <input type="text" id="ai-in" placeholder="Ask AI...">
                    <button onclick="askAI()">SEND</button>
                </div>
            </div>
            <div class="card">
                <small style="color:var(--accent)">INTEL FEED</small>
                <div id="news-list">Scanning...</div>
            </div>
        </div>

        <div id="media-tab" style="display:none; padding:10px;">
            <iframe width="100%" height="200" src="https://www.youtube.com/embed/wjjRjkFu1W8?autoplay=1" frameborder="0" allowfullscreen></iframe>
        </div>

        <div id="radar-tab" style="display:none; padding:10px;">
            <div id="flight-list" class="scroll-box">Scanning Airspace...</div>
        </div>
    </aside>

    <div class="resizer" id="resizer">══ RESIZE MAP ══</div>
    <main id="map"></main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([24.45, 54.37], 10);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    let userMarker = null;
    let zoneLayers = L.layerGroup().addTo(map);

    function updateDangerZones() {
        zoneLayers.clearLayers();
        const zones = [
            {n: "Abu Dhabi", p: [24.45, 54.37], r: 8000},
            {n: "Dubai", p: [25.20, 55.27], r: 10000},
            {n: "Khalifa City", p: [24.41, 54.58], r: 4000}
        ];
        zones.forEach(z => L.circle(z.p, {radius: z.r, color: 'red', fillOpacity: 0.3}).addTo(zoneLayers));
    }

    // FIXED LOCATION LOGIC
    function requestLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (p) => {
                    const loc = [p.coords.latitude, p.coords.longitude];
                    if(userMarker) map.removeLayer(userMarker);
                    userMarker = L.circle(loc, {radius: 500, color: '#38bdf8', fillColor: '#38bdf8', fillOpacity: 0.8}).addTo(map);
                    map.flyTo(loc, 11);
                },
                (err) => { alert("GPS Denied. Please enable location in browser settings."); },
                { enableHighAccuracy: true, timeout: 5000 }
            );
        }
    }

    function init() {
        document.getElementById('portal').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        setTimeout(() => map.invalidateSize(), 200);
        updateDangerZones();
        fetchNews();
        fetchAllFlights();
        requestLocation(); // Force Location Trigger
        
        setInterval(() => {
            document.getElementById('timer').innerText = new Date().toLocaleTimeString();
            updateDangerZones(); // REFRESH ZONES EVERY 20s
        }, 20000);
    }

    // FIXED AI: NO REDIRECT (Free Mistral API)
    async function askAI() {
        const inp = document.getElementById('ai-in');
        const hist = document.getElementById('chat-hist');
        const txt = inp.value.trim();
        if(!txt) return;

        hist.innerHTML += `<div style="text-align:right; margin:5px 0;">${txt}</div>`;
        inp.value = "";
        
        try {
            // Using a public inference endpoint (No key, no redirect)
            const r = await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ inputs: `UAE Emergency Advice: ${txt}` })
            });
            const d = await r.json();
            const reply = d[0]?.generated_text || "Guardian offline. Retrying...";
            hist.innerHTML += `<div style="color:var(--accent); margin-bottom:10px;">${reply.split('Advice:')[1] || reply}</div>`;
        } catch(e) { hist.innerHTML += `<div style="color:red">AI Link Timeout.</div>`; }
        hist.scrollTop = hist.scrollHeight;
    }

    async function fetchNews() {
        try {
            const r = await fetch(`https://newsdata.io/api/1/news?apikey=${CONFIG.NEWS_KEY}&q=UAE&language=en`);
            const d = await r.json();
            document.getElementById('news-list').innerHTML = d.results.slice(0,5).map(n => `<div style="margin-bottom:8px;"><a href="${n.link}" target="_blank" style="color:var(--accent); text-decoration:none;">${n.title}</a></div>`).join('');
        } catch(e) {}
    }

    async function fetchAllFlights() {
        try {
            const r = await fetch(`https://api.aviationstack.com/v1/flights?access_key=${CONFIG.FLIGHT_KEY}&limit=5`);
            const d = await r.json();
            document.getElementById('flight-list').innerHTML = d.data.map(f => `<div>${f.flight.iata}: ${f.departure.iata}➔${f.arrival.iata}</div>`).join('');
        } catch(e) {}
    }

    // RESIZER LOGIC
    const resizer = document.getElementById('resizer');
    const sidebar = document.getElementById('sidebar');
    let isResizing = false;
    resizer.addEventListener('mousedown', () => isResizing = true);
    document.addEventListener('mousemove', (e) => { if (isResizing) { sidebar.style.height = `${e.clientY}px`; map.invalidateSize(); } });
    document.addEventListener('mouseup', () => isResizing = false);
    resizer.addEventListener('touchstart', () => isResizing = true);
    document.addEventListener('touchmove', (e) => { if (isResizing) { sidebar.style.height = `${e.touches[0].clientY}px`; map.invalidateSize(); } });
    document.addEventListener('touchend', () => isResizing = false);

    function switchTab(t) {
        document.getElementById('ai-tab').style.display = t==='ai'?'block':'none';
        document.getElementById('media-tab').style.display = t==='media'?'block':'none';
        document.getElementById('radar-tab').style.display = t==='radar'?'block':'none';
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
